<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DugongID — Conservation Photo-ID</title>
  <meta name="description" content="Offline-first photo-ID and research tool for dugong conservation: dorsal/fluke annotation, computer-assisted individual matching, and observation tracking.">
  <meta name="theme-color" content="#0c1413">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <svg width="34" height="34" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 18c4-5 9-8 12-8s8 3 12 8c-4 5-9 8-12 8"/>
          <path d="M16 18c-3 0-6-2-8-5"/>
          <path d="M28 18l-3-3M28 18l-3 3"/>
          <circle cx="9" cy="15" r="1.1" fill="currentColor"/>
        </svg>
        <div><b>DugongID</b><span>Conservation photo-ID</span></div>
      </div>
      <nav class="nav" aria-label="Main">
        <button data-route="dashboard" class="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Overview</button>
        <button data-route="identify">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          Identify photo</button>
        <button data-route="catalog">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Individuals</button>
        <button data-route="observations">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
          Observations</button>
        <button data-route="about">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>
          How it works</button>
      </nav>
      <div class="sidebar-foot">
        <button class="btn btn-ghost btn-sm toggle-theme" data-theme-toggle aria-label="Switch to dark mode" style="justify-content:center;width:100%"></button>
        <p style="font-size:var(--text-xs);color:var(--color-text-faint);text-align:center">Offline · data stays on device</p>
      </div>
    </aside>

    <div>
      <nav class="mobile-nav" aria-label="Main mobile">
        <button data-route="dashboard" class="active">Overview</button>
        <button data-route="identify">Identify</button>
        <button data-route="catalog">Individuals</button>
        <button data-route="observations">Observations</button>
        <button data-route="about">How it works</button>
      </nav>
      <main class="main" id="main"></main>
    </div>
  </div>

  <!-- Offline PDF generation -->
  <script src="vendor/jspdf.umd.min.js"></script>
  <!-- App modules -->
  <script src="js/db.js"></script>
  <script src="js/matching.js"></script>
  <script src="js/annotator.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/app.js"></script>

  <!-- Theme toggle -->
  <script>
  (function(){const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
    let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';r.setAttribute('data-theme',d);
    const icon=(m)=>m==='dark'
      ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg> Light'
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg> Dark';
    if(t){t.innerHTML=icon(d);t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);
      t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');t.innerHTML=icon(d);});}
  })();
  </script>

  <!-- Service worker for offline use (only over http/https, not file://) -->
  <script>
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  </script>
</body>
</html>
